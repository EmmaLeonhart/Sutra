<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>Akasha — Fly Brain Visualizer</title>
<style>
    :root {
        --akasha-purple: #7c4dff;
        --akasha-purple-dim: rgba(124, 77, 255, 0.35);
        --fg: #1f1a33;
        --bg: #f7f5fc;
        --muted: #6a6685;
        --pn: #536dfe;
        --kc-dim: rgba(124, 77, 255, 0.18);
        --kc-active: #7c4dff;
        --apl: #ff6e40;
        --mbon: #00bfa5;
    }
    @media (prefers-color-scheme: dark) {
        :root {
            --fg: #e4def0;
            --bg: #1d1930;
            --muted: #9892b2;
            --kc-dim: rgba(179, 136, 255, 0.25);
            --kc-active: #b388ff;
        }
    }
    html, body {
        margin: 0; padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        font-size: 13px;
        overflow: hidden;
        height: 100%;
    }
    .viz-root {
        display: flex;
        flex-direction: column;
        height: 100vh;
    }
    .viz-header {
        padding: 12px 16px 4px 16px;
        border-bottom: 1px solid var(--akasha-purple-dim);
    }
    .viz-title {
        font-size: 14px;
        font-weight: 600;
        margin: 0 0 4px 0;
        color: var(--akasha-purple);
    }
    .viz-subtitle {
        font-size: 12px;
        margin: 0;
        color: var(--muted);
        line-height: 1.4;
    }
    .viz-body {
        flex: 1 1 auto;
        min-height: 0;
        position: relative;
    }
    canvas#topology {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        display: block;
    }
    .viz-footer {
        padding: 8px 16px;
        border-top: 1px solid var(--akasha-purple-dim);
        font-size: 11px;
        color: var(--muted);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
    }
    .legend {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        align-items: center;
    }
    .legend-dot {
        display: inline-block;
        width: 9px; height: 9px;
        border-radius: 50%;
        margin-right: 4px;
        vertical-align: middle;
    }
    .viz-buttons {
        display: flex;
        gap: 6px;
    }
    button {
        font-family: inherit;
        font-size: 11px;
        padding: 4px 10px;
        border: 1px solid var(--akasha-purple-dim);
        background: transparent;
        color: var(--fg);
        border-radius: 3px;
        cursor: pointer;
    }
    button:hover { background: var(--akasha-purple); color: #fff; border-color: var(--akasha-purple); }
</style>
</head>
<body>
<div class="viz-root">
    <div class="viz-header">
        <p class="viz-title">Akasha — Fly Brain (topological)</p>
        <p class="viz-subtitle">
            50 projection neurons &rarr; ~200 sampled Kenyon cells (of 2000 total) &rarr; 1 APL &rarr; 20 MBONs.
            <em>v0.3 placeholder: static topology with 5%-sparsity KC activity simulated by re-sampling on repaint.
            No live Brian2 feed yet.</em>
        </p>
    </div>
    <div class="viz-body">
        <canvas id="topology"></canvas>
    </div>
    <div class="viz-footer">
        <div class="legend">
            <span><span class="legend-dot" style="background:var(--pn)"></span>PN (50)</span>
            <span><span class="legend-dot" style="background:var(--kc-active)"></span>KC firing (~5%)</span>
            <span><span class="legend-dot" style="background:var(--kc-dim);border:1px solid var(--akasha-purple-dim)"></span>KC quiet</span>
            <span><span class="legend-dot" style="background:var(--apl)"></span>APL</span>
            <span><span class="legend-dot" style="background:var(--mbon)"></span>MBON (20)</span>
        </div>
        <div class="viz-buttons">
            <button id="tick">Re-sample activity</button>
        </div>
    </div>
</div>
<script>
/*
 * Akasha fly-brain topological visualizer (v0.3 placeholder).
 *
 * Renders the reference mushroom-body circuit as a static layered
 * graph: 50 PNs on the left, ~200 sampled KCs (out of the real 2000,
 * subsampled for rendering performance inside the tool window),
 * 1 APL inhibition sink near the KC layer, and 20 MBONs on the
 * right. KC sparsity (~5% firing) is simulated by picking a fresh
 * random 5% of KCs on every paint — no live Brian2 data yet, the
 * point is that the pane LOOKS like a fly-brain circuit the
 * instant you open it.
 *
 * Connectivity: each KC receives 7 PN inputs (matches the biological
 * fan-in used by fly-brain/mushroom_body_model.py), drawn as thin
 * lines with alpha scaled so the ~1400 PN→KC edges in the sampled
 * subset don't overwhelm the frame. APL gets a single dashed
 * inhibition loop back to the KC layer. Each MBON samples 40 random
 * KCs to draw its readout fan-in.
 */
(function () {
    "use strict";

    const canvas = /** @type {HTMLCanvasElement} */ (document.getElementById("topology"));
    const ctx = canvas.getContext("2d");
    const tickBtn = document.getElementById("tick");

    const PN_COUNT = 50;
    const KC_SAMPLED = 200;  // subsample of 2000 for rendering
    const MBON_COUNT = 20;
    const PN_FAN_IN = 7;
    const MBON_READOUT_FAN_IN = 40;
    const KC_SPARSITY = 0.05;

    /** Seeded LCG for reproducible connectivity. */
    function rng(seed) {
        let s = seed >>> 0;
        return function () {
            s = (s * 1664525 + 1013904223) >>> 0;
            return s / 4294967296;
        };
    }

    /** Fixed seed so the structural topology is deterministic. */
    const STRUCT_SEED = 0xA0A5A;
    const connectivity = (function buildConnectivity() {
        const rand = rng(STRUCT_SEED);
        /** @type {number[][]} per-KC list of PN indices */
        const kcInputs = [];
        for (let k = 0; k < KC_SAMPLED; k++) {
            const chosen = new Set();
            while (chosen.size < PN_FAN_IN) {
                chosen.add(Math.floor(rand() * PN_COUNT));
            }
            kcInputs.push(Array.from(chosen));
        }
        /** @type {number[][]} per-MBON list of KC indices it reads out */
        const mbonReadouts = [];
        for (let m = 0; m < MBON_COUNT; m++) {
            const chosen = new Set();
            while (chosen.size < MBON_READOUT_FAN_IN) {
                chosen.add(Math.floor(rand() * KC_SAMPLED));
            }
            mbonReadouts.push(Array.from(chosen));
        }
        return { kcInputs, mbonReadouts };
    })();

    /** Pseudo-random 5% KC firing state, resampled on each tick. */
    let activitySeed = 1;
    function sampleActivity() {
        const rand = rng(activitySeed);
        const active = new Array(KC_SAMPLED).fill(false);
        const k = Math.max(1, Math.round(KC_SAMPLED * KC_SPARSITY));
        const chosen = new Set();
        while (chosen.size < k) {
            chosen.add(Math.floor(rand() * KC_SAMPLED));
        }
        for (const i of chosen) active[i] = true;
        return active;
    }
    let kcActive = sampleActivity();

    function resizeCanvas() {
        const dpr = window.devicePixelRatio || 1;
        const rect = canvas.getBoundingClientRect();
        canvas.width = Math.max(1, Math.floor(rect.width * dpr));
        canvas.height = Math.max(1, Math.floor(rect.height * dpr));
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    function pnPos(i, w, h) {
        const x = w * 0.10;
        const y = (i + 1) / (PN_COUNT + 1) * h;
        return { x, y };
    }
    function kcPos(i, w, h) {
        // Kenyon cells are a blob in the middle — spread vertically
        // and horizontally inside a rectangle so the viewer reads
        // "big population, high dimension."
        const cols = 20;
        const rows = Math.ceil(KC_SAMPLED / cols);
        const col = i % cols;
        const row = Math.floor(i / cols);
        const x = w * 0.35 + col * (w * 0.30 / cols);
        const y = h * 0.10 + row * (h * 0.80 / rows);
        return { x, y };
    }
    function mbonPos(i, w, h) {
        const x = w * 0.90;
        const y = (i + 1) / (MBON_COUNT + 1) * h;
        return { x, y };
    }
    function aplPos(w, h) {
        return { x: w * 0.50, y: h * 0.03 };
    }

    function cssVar(name) {
        return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
    }

    function draw() {
        const rect = canvas.getBoundingClientRect();
        const w = rect.width;
        const h = rect.height;
        ctx.clearRect(0, 0, w, h);

        const colorPN       = cssVar("--pn")       || "#536dfe";
        const colorKcActive = cssVar("--kc-active") || "#7c4dff";
        const colorKcDim    = cssVar("--kc-dim")    || "rgba(124,77,255,0.18)";
        const colorApl      = cssVar("--apl")      || "#ff6e40";
        const colorMbon     = cssVar("--mbon")     || "#00bfa5";

        // --- PN → KC edges ---
        ctx.lineWidth = 0.5;
        ctx.strokeStyle = "rgba(124, 77, 255, 0.10)";
        ctx.beginPath();
        for (let k = 0; k < KC_SAMPLED; k++) {
            const { x: kx, y: ky } = kcPos(k, w, h);
            const inputs = connectivity.kcInputs[k];
            for (const p of inputs) {
                const { x: px, y: py } = pnPos(p, w, h);
                ctx.moveTo(px, py);
                ctx.lineTo(kx, ky);
            }
        }
        ctx.stroke();

        // --- KC → MBON readout edges ---
        ctx.lineWidth = 0.5;
        ctx.strokeStyle = "rgba(0, 191, 165, 0.14)";
        ctx.beginPath();
        for (let m = 0; m < MBON_COUNT; m++) {
            const { x: mx, y: my } = mbonPos(m, w, h);
            const readouts = connectivity.mbonReadouts[m];
            for (const k of readouts) {
                const { x: kx, y: ky } = kcPos(k, w, h);
                ctx.moveTo(kx, ky);
                ctx.lineTo(mx, my);
            }
        }
        ctx.stroke();

        // --- APL inhibition loop: one dashed arc back to the KC blob ---
        const apl = aplPos(w, h);
        ctx.save();
        ctx.setLineDash([4, 4]);
        ctx.strokeStyle = colorApl;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(apl.x, apl.y + 8);
        ctx.quadraticCurveTo(apl.x, h * 0.45, w * 0.50, h * 0.50);
        ctx.stroke();
        ctx.restore();

        // --- PN nodes ---
        ctx.fillStyle = colorPN;
        for (let i = 0; i < PN_COUNT; i++) {
            const { x, y } = pnPos(i, w, h);
            ctx.beginPath();
            ctx.arc(x, y, 2.8, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- KC nodes (quiet pass) ---
        ctx.fillStyle = colorKcDim;
        for (let i = 0; i < KC_SAMPLED; i++) {
            if (kcActive[i]) continue;
            const { x, y } = kcPos(i, w, h);
            ctx.beginPath();
            ctx.arc(x, y, 1.8, 0, Math.PI * 2);
            ctx.fill();
        }
        // --- KC nodes (active pass, drawn on top) ---
        ctx.fillStyle = colorKcActive;
        for (let i = 0; i < KC_SAMPLED; i++) {
            if (!kcActive[i]) continue;
            const { x, y } = kcPos(i, w, h);
            ctx.beginPath();
            ctx.arc(x, y, 3.0, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- APL node ---
        ctx.fillStyle = colorApl;
        ctx.beginPath();
        ctx.arc(apl.x, apl.y, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(255, 110, 64, 0.75)";
        ctx.font = "10px JetBrains Mono, monospace";
        ctx.textAlign = "center";
        ctx.fillText("APL", apl.x, apl.y - 8);

        // --- MBON nodes ---
        ctx.fillStyle = colorMbon;
        for (let i = 0; i < MBON_COUNT; i++) {
            const { x, y } = mbonPos(i, w, h);
            ctx.beginPath();
            ctx.arc(x, y, 3.2, 0, Math.PI * 2);
            ctx.fill();
        }

        // --- Layer labels ---
        ctx.fillStyle = "rgba(106, 102, 133, 0.85)";
        ctx.font = "10px Inter, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("PN (50)", w * 0.10, h - 4);
        ctx.fillText("KC (2000, ~5% active)", w * 0.50, h - 4);
        ctx.fillText("MBON (20)", w * 0.90, h - 4);
    }

    function rerender() {
        resizeCanvas();
        draw();
    }

    tickBtn.addEventListener("click", function () {
        activitySeed = (activitySeed * 48271 + 3) >>> 0;
        kcActive = sampleActivity();
        rerender();
    });
    window.addEventListener("resize", rerender);
    requestAnimationFrame(rerender);
})();
</script>
</body>
</html>
