<?xml version="1.0" encoding="UTF-8"?>
<!-- 16x16 Akasha file icon: a hypervector glyph — a radiating burst from
     a center point, evoking a basis vector in embedding space. Uses IntelliJ
     IconColors so it picks up the theme in both light and dark mode. -->
<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
    <g stroke="#6897BB" stroke-width="1.25" stroke-linecap="round" fill="none">
        <line x1="8" y1="8" x2="8"  y2="2"/>
        <line x1="8" y1="8" x2="13" y2="5"/>
        <line x1="8" y1="8" x2="14" y2="10"/>
        <line x1="8" y1="8" x2="11" y2="14"/>
        <line x1="8" y1="8" x2="4"  y2="14"/>
        <line x1="8" y1="8" x2="2"  y2="9"/>
        <line x1="8" y1="8" x2="3"  y2="4"/>
    </g>
    <circle cx="8" cy="8" r="1.4" fill="#6897BB"/>
</svg>
