name: Papers CI — auto-submit and fetch reviews

# Auto-submit the two currently-maintained papers to clawRxiv whenever
# their paper.md or SKILL.md is updated on master, and fetch the AI peer
# review afterward. Manual workflow_dispatch also supported for one-off
# resubmissions or backfills.
#
# Scoped explicitly to the two papers we are still iterating on:
#   - sutra-paper/       ("Sutra: A Vector Programming Language ...")
#   - fly-brain-paper/    ("Turing-Complete Computation on the Drosophila Hemibrain Connectome")
#
# The Latent Space Cartography paper is deliberately NOT handled here —
# it lives in its own repo (EmmaLeonhart/latent-space-cartography) and
# is submitted by that repo's CI, not ours.
#
# To opt out of auto-submission even when the file path matches, add a
# `Skip-Submit: true` trailer to the commit message (same shape as
# `Signed-off-by:` / `Co-Authored-By:`). The papers-ci workflow's own
# auto-commits always include this trailer to prevent infinite loops.
#
# Why a trailer and not `[skip submit]` in the subject: the earlier
# `[skip submit]` grep was too broad — it matched the literal string
# anywhere in the message, including prose descriptions of how the
# skip mechanism works. A trailer is on its own line at the bottom of
# the commit body, far less likely to collide with unrelated prose.

on:
  push:
    branches: [master]
    paths:
      - 'sutra-paper/paper.md'
      - 'sutra-paper/SKILL.md'
      - 'fly-brain-paper/paper.md'
      - 'fly-brain-paper/SKILL.md'
  workflow_dispatch:
    inputs:
      paper:
        description: 'Which paper to submit (workflow_dispatch only)'
        required: true
        type: choice
        default: both
        options:
          - sutra-paper
          - fly-brain-paper
          - both

concurrency:
  group: papers-ci-${{ github.ref }}
  cancel-in-progress: false

jobs:
  detect-changed:
    name: Detect changed papers
    runs-on: ubuntu-latest
    outputs:
      sutra: ${{ steps.filter.outputs.sutra }}
      fly_brain: ${{ steps.filter.outputs.fly_brain }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Classify which papers this run covers
        id: filter
        run: |
          set -euo pipefail

          # Honor the Skip-Submit: true trailer in the push commit message.
          # Scoped to its own line at the bottom of the commit body so prose
          # descriptions can mention the skip mechanism without accidentally
          # tripping it (the reason the earlier `[skip submit]` check got
          # triggered by a commit that was describing the feature, not
          # opting out of it).
          if [ "${{ github.event_name }}" = "push" ]; then
            if git log -1 --pretty=%B | grep -Eq "^Skip-Submit:[[:space:]]*true$"; then
              echo "Commit has Skip-Submit: true trailer — skipping both papers"
              echo "sutra=false" >> "$GITHUB_OUTPUT"
              echo "fly_brain=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi

          # Manual dispatch: honor the input dropdown verbatim.
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            case "${{ github.event.inputs.paper }}" in
              sutra-paper)
                echo "sutra=true"    >> "$GITHUB_OUTPUT"
                echo "fly_brain=false" >> "$GITHUB_OUTPUT"
                ;;
              fly-brain-paper)
                echo "sutra=false"   >> "$GITHUB_OUTPUT"
                echo "fly_brain=true"  >> "$GITHUB_OUTPUT"
                ;;
              both)
                echo "sutra=true"    >> "$GITHUB_OUTPUT"
                echo "fly_brain=true"  >> "$GITHUB_OUTPUT"
                ;;
            esac
            exit 0
          fi

          # Push trigger: diff HEAD~1..HEAD against the two paper paths.
          CHANGED="$(git diff --name-only HEAD~1 HEAD || true)"
          echo "changed files:"
          echo "$CHANGED"

          sutra=false
          fly_brain=false
          if echo "$CHANGED" | grep -Eq '^sutra-paper/(paper|SKILL)\.md$'; then
            sutra=true
          fi
          if echo "$CHANGED" | grep -Eq '^fly-brain-paper/(paper|SKILL)\.md$'; then
            fly_brain=true
          fi
          echo "sutra=$sutra"       >> "$GITHUB_OUTPUT"
          echo "fly_brain=$fly_brain" >> "$GITHUB_OUTPUT"

  submit:
    name: Submit ${{ matrix.paper_dir }}
    needs: detect-changed
    if: needs.detect-changed.outputs.sutra == 'true' || needs.detect-changed.outputs.fly_brain == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    # max-parallel: 1 serializes the two paper jobs so their auto-commits
    # of .post_id and reviews/ don't race each other when both papers
    # change in the same push.
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - paper_dir: sutra-paper
            slug: sutra
            title: "Sutra: A Vector Programming Language for Computation in Embedding Spaces"
            tags: "programming-languages,vector-symbolic-architectures,embedding-spaces,fuzzy-logic,sutra"
          - paper_dir: fly-brain-paper
            slug: fly_brain
            title: "Turing-Complete Computation on the Drosophila Hemibrain Connectome"
            tags: "programming-languages,vector-symbolic-architectures,connectomics,drosophila,sutra,fly-brain"
    steps:
      - name: Skip if this paper did not change
        id: should_run
        run: |
          set -euo pipefail
          if [ "${{ matrix.slug }}" = "sutra" ]; then
            if [ "${{ needs.detect-changed.outputs.sutra }}" != "true" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          if [ "${{ matrix.slug }}" = "fly_brain" ]; then
            if [ "${{ needs.detect-changed.outputs.fly_brain }}" != "true" ]; then
              echo "skip=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        if: steps.should_run.outputs.skip != 'true'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          # Need full history so the auto-commit can push cleanly.
          fetch-depth: 0

      - uses: actions/setup-python@v5
        if: steps.should_run.outputs.skip != 'true'
        with:
          python-version: '3.13'

      - name: Submit to clawRxiv and fetch review
        if: steps.should_run.outputs.skip != 'true'
        env:
          CLAWRXIV_API_KEY: ${{ secrets.CLAWRXIV_API_KEY }}
        run: |
          # Review polling schedule: check every 15 minutes, keep
          # trying for up to 3 hours, then give up. The reason the
          # interval is this long and not every-30-seconds: Gemini 3
          # Flash reviews on clawRxiv are not latency-predictable —
          # fly-brain-paper's original run hit a 10-minute ceiling
          # and missed, but the review was actually ready not long
          # after. 15 min / 3 h is the schedule the user specified.
          #
          # GitHub Actions has a 6-hour default job timeout, so 3 h
          # of polling still leaves 3 h of headroom per paper job.
          # max-parallel: 1 above serializes the two paper jobs so
          # the overall workflow can consume up to 2 * (submit_time
          # + 3 h) in the worst case — still well within budget.
          python scripts/paper_submit_and_fetch.py \
            --paper-dir "${{ matrix.paper_dir }}" \
            --title "${{ matrix.title }}" \
            --tags "${{ matrix.tags }}" \
            --poll-seconds 900 \
            --review-timeout-seconds 10800

      - name: Commit updates on a branch and open PR
        if: steps.should_run.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only stage the files this job is allowed to touch. This avoids
          # accidentally committing anything stray that may have landed in
          # the working tree during the Python run.
          git add "${{ matrix.paper_dir }}/.post_id" || true
          git add "${{ matrix.paper_dir }}/reviews/"  || true

          if git diff --cached --quiet; then
            echo "No .post_id / reviews changes to commit"
            exit 0
          fi

          # Branch + PR flow (replaces the old direct-to-master push).
          # Rationale: direct pushes from CI to master have been racing
          # with human commits and occasionally losing data. A PR per run
          # gives an explicit merge point and keeps the history clean.
          # Branch name includes the run id so parallel matrix jobs never
          # collide. Future work: auto-merge via branch protection rule.
          BRANCH="papers-ci/${{ matrix.paper_dir }}/run-${{ github.run_id }}"
          git switch -c "$BRANCH"

          # Skip-Submit trailer preserved as defense in depth: if the
          # PR is ever merged via a rebase that brings this commit to
          # master, the path filter + trailer both still prevent re-fire.
          git commit -m "papers-ci: ${{ matrix.paper_dir }} submission + review" \
                     -m "Skip-Submit: true"

          git push --set-upstream origin "$BRANCH"

          # Body written to a file so the YAML block scalar doesn't get
          # terminated by the blank lines in a heredoc-style --body arg.
          # (An earlier version inlined a multi-line --body "..." and the
          # zero-indent blank lines ended the block scalar, producing a
          # workflow that GitHub accepted but launched with 0 jobs.)
          printf '%s\n' \
            "Automated submission + review fetch for \`${{ matrix.paper_dir }}\` (run ${{ github.run_id }})." \
            "" \
            "Merge when ready. Contents: updated \`.post_id\` and \`reviews/\` only." \
            "" \
            "Skip-Submit: true" > /tmp/pr_body.md

          gh pr create \
            --base master \
            --head "$BRANCH" \
            --title "papers-ci: ${{ matrix.paper_dir }} submission + review" \
            --body-file /tmp/pr_body.md
