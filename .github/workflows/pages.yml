name: Deploy GitHub Pages site

# Builds the Sutra language website with MkDocs Material and deploys
# it to GitHub Pages on every push to master that touches the docs
# tree, the mkdocs config, the README, or the planning specs that the
# docs reference. Uses the official actions/deploy-pages flow, so the
# repo's Pages settings need to be set to "Source: GitHub Actions"
# (Settings → Pages → Build and deployment → Source).
#
# Live at: https://sutralang.dev
# (Custom domain — docs/CNAME pins the Pages deploy to sutralang.dev
# and MkDocs copies the CNAME file into the build output where
# GitHub Pages picks it up on deploy. DNS for the domain is
# configured by the domain owner outside this repo; see GitHub's
# custom-domain docs for the required A / CNAME records. After the
# first successful deploy, enable "Enforce HTTPS" in Settings →
# Pages once Let's Encrypt provisions the cert, which usually
# takes a few minutes after the domain resolves.)

on:
  push:
    branches: [master]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'README.md'
      - 'planning/sutra-spec/**'
      - 'sutraDB/pages/**'
      - 'paper/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

# A single deploy at a time. The "pages" group is the conventional one
# for the actions/deploy-pages action and lets it serialize cleanly.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build site with MkDocs Material
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install MkDocs Material
        run: |
          python -m pip install --upgrade pip
          pip install \
            "mkdocs-material>=9.5.0" \
            "pymdown-extensions>=10.0" \
            "mkdocs>=1.6.0"

      - name: Install TeX Live + pandoc (for paper PDF builds)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-luatex \
            texlive-xetex \
            lmodern \
            latexmk \
            pandoc

      - name: Build paper PDFs (named + anonymized)
        working-directory: paper
        run: |
          # Generate the LaTeX body from paper.md. paper.tex \input's
          # paper.tex.body, so the actual paper content (abstract,
          # sections 1-5, references, all 1100+ lines) lands in the
          # PDF rather than just the title-page skeleton.
          # --no-highlight: emit code blocks as plain Verbatim instead
          #   of pandoc's Highlighting + token-color macros, which
          #   would otherwise need pandoc's full default preamble.
          # --from=markdown-smart (not gfm): pandoc's gfm reader does
          # not support raw_tex, so \begin{align*}/\begin{figure}/
          # \begin{tikzpicture} blocks in paper.md were being escaped
          # into \textbackslash literals and typeset as source-code
          # gibberish. The markdown reader passes raw LaTeX through.
          pandoc paper.md \
            --from=markdown-smart \
            --to=latex \
            --output=paper.tex.body \
            --wrap=preserve \
            --no-highlight
          # lualatex handles Unicode natively (−, ≈, ∞, etc.) which the
          # paper uses heavily. -lualatex picks lualatex via latexmk.
          latexmk -lualatex -interaction=nonstopmode paper.tex
          mv paper.pdf paper-named.pdf
          # Clean intermediate files before the second build.
          latexmk -c paper.tex || true
          # Anonymized (NeurIPS double-blind). Pretex declares \ifanon
          # and \anontrue ahead of paper.tex, which guards its own
          # \newif so the pretex's value is preserved.
          latexmk -lualatex -interaction=nonstopmode \
            -usepretex='\newif\ifanon\anontrue' paper.tex
          mv paper.pdf paper-anonymized.pdf

      - name: Stage paper PDFs into docs/ for MkDocs link validation
        run: |
          # Copy PDFs into docs/ BEFORE mkdocs build so strict-mode
          # link validation sees them as valid targets. The files
          # are gitignored at the docs/ level (intentional: the
          # build artifact, not source); the workflow re-creates
          # them on every run.
          cp paper/paper-named.pdf docs/paper.pdf
          cp paper/paper-anonymized.pdf docs/paper-anonymized.pdf

      - name: Build site
        run: |
          mkdocs build --strict --verbose

      - name: Integrate SutraDB static site at /SutraDB/
        run: |
          # SutraDB keeps its own static HTML site under sutraDB/pages/
          # (index.html, style.css, subdirectories for each section).
          # Mount it at /SutraDB/ on the main Sutra language site so that
          # https://sutralang.dev/SutraDB/ serves the database's own
          # landing page. SutraDB is a core piece of the Sutra ecosystem —
          # the language programs vectors, the database stores them — and
          # a single integrated docs site is the least surprising place
          # for users to find both.
          #
          # Caveats:
          #   - SutraDB's pages may contain absolute hrefs (/...) that
          #     point at the root of its original standalone site (which
          #     used to live at sutradb.org / on its own GitHub Pages).
          #     Those links will need a pass to become relative or to
          #     prefix /SutraDB/ when encountered. The first deploy will
          #     surface exactly which links break; fix is follow-up work.
          #   - sutraDB/pages/CNAME and sitemap.xml are intentionally NOT
          #     copied — the CNAME binds the site to sutradb.org and the
          #     sitemap targets that domain. Leaving them out means the
          #     integrated subsite serves cleanly under the parent
          #     domain without competing DNS claims.
          mkdir -p _site/SutraDB
          rsync -a \
            --exclude=CNAME \
            --exclude=sitemap.xml \
            sutraDB/pages/ _site/SutraDB/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
