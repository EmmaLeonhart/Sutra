name: Deploy GitHub Pages site

# The Sutra website is a multi-page static site rendered from
# docs/**/*.md + paper/paper.md by scripts/build_site.py onto the
# shared emmaleonhart.com identity, with the paper PDFs + reproduction
# zip downloadable. No MkDocs (the old MkDocs Material site was
# scrapped 2026-05-16; the conceptual pages were restored under the
# new static pipeline 2026-05-17).
#
# Live at: https://sutra.emmaleonhart.com
# (Custom domain — web/CNAME pins the Pages deploy; build_site.py
# copies it into the output where GitHub Pages picks it up. DNS is
# configured by the domain owner outside this repo.)

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'web/**'
      - 'scripts/build_site.py'
      - 'scripts/build_supplementary_zip.py'
      - 'paper/**'
      - '.github/workflows/pages.yml'
      # The supplementary zip is built and deployed here, so anything
      # that changes its contents should retrigger the deploy.
      - 'sdk/sutra-compiler/**'
      - 'examples/**'
      - 'experiments/**'
  workflow_dispatch:

# A single deploy at a time. The "pages" group is the conventional one
# for the actions/deploy-pages action and lets it serialize cleanly.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    name: Build the single static page
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install build deps
        run: |
          python -m pip install --upgrade pip
          pip install "markdown>=3.5"

      - name: Install TeX Live + pandoc (for paper PDF builds)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-luatex \
            texlive-xetex \
            lmodern \
            latexmk \
            pandoc

      - name: Build paper PDFs (named + anonymized)
        working-directory: paper
        run: |
          # Mirrors paper-pdf.yml's build pipeline so the on-site
          # download links resolve. Any change here must be mirrored
          # in paper-pdf.yml (and vice versa).
          sed \
            -e '1{/^# /d}' \
            -e 's|^## Abstract$|## Abstract {-}|' \
            -e 's|^## References$|## References {-}|' \
            -e 's|^## Appendix$|## Appendix {-}|' \
            -e 's|^### Appendix \([A-Z]\)\. \(.*\)$|### Appendix \1. \2 {-}|' \
            paper.md > paper-pre.md
          pandoc paper-pre.md \
            --from=markdown-smart \
            --to=latex \
            --output=paper.tex.body \
            --wrap=preserve \
            --no-highlight \
            --shift-heading-level-by=-1
          latexmk -pdf -interaction=nonstopmode \
            -e '$max_repeat=8' paper.tex
          mv paper.pdf paper-named.pdf
          # arXiv-blocking-error gate: latexmk -interaction=nonstopmode
          # continues past LaTeX errors and still emits a PDF, so a CI
          # green check does NOT mean strict pdflatex (arXiv) will
          # accept the source. Grep the log for hard errors and fail
          # the build if any are present — the round-4 'No counter
          # none defined' incident shipped a broken arXiv tarball
          # because this gate did not exist.
          if grep -E '^! LaTeX Error:' paper.log; then
            echo "::error::LaTeX Error(s) detected in paper.log — arXiv would reject this source. Fix and re-push."
            exit 1
          fi
          latexmk -c paper.tex || true
          latexmk -pdf -interaction=nonstopmode \
            -e '$max_repeat=8' \
            -usepretex='\newif\ifanon\anontrue' paper.tex
          mv paper.pdf paper-anonymized.pdf
          if grep -E '^! LaTeX Error:' paper.log; then
            echo "::error::LaTeX Error(s) in anonymized build's paper.log — fix and re-push."
            exit 1
          fi

      - name: Build formal-verification paper PDF
        working-directory: paper/formal-verification
        run: |
          # The FV paper is markdown-only (no .tex wrapper, no .sty).
          # pandoc renders it directly via the latex pdf-engine. Output
          # is staged at /formal-verification.pdf on the site so the
          # /papers/ index page's "Download PDF" link resolves. Emma
          # authorized this PDF build path 2026-05-27 (the live clawRxiv
          # /api/posts/2622/revise endpoint started returning HTTP 404
          # server-side; this gives an on-site PDF independent of that).
          pandoc paper.md \
            --from=markdown-smart \
            --to=pdf \
            --pdf-engine=xelatex \
            --variable=geometry:margin=1in \
            --variable=fontsize:11pt \
            --variable=linkcolor:blue \
            --variable=urlcolor:blue \
            --variable=colorlinks:true \
            --toc \
            --output=formal-verification.pdf
          ls -la formal-verification.pdf

      - name: Build arXiv source tarball
        working-directory: paper
        run: |
          # arXiv submission bundle: paper.tex (wrapper) + paper.tex.body
          # (pandoc output of paper.md, generated above) + neurips_2026.sty.
          # arXiv's TeX Live runs pdflatex on these three flat files;
          # pandoc is NOT run on their side, so we ship pandoc's output
          # pre-generated. Three flat files, no nested directory.
          tar -czf ../sutra-arxiv-source.tar.gz \
            paper.tex paper.tex.body neurips_2026.sty
          ls -la ../sutra-arxiv-source.tar.gz

      - name: Build replication package + NeurIPS supplementary zips
        run: |
          # Replication package (live paper/supplementary/) — what the
          # live paper + /paper/ link.
          python scripts/build_supplementary_zip.py \
              --output sutra-replication-package.zip
          # NeurIPS submission supplementary (frozen
          # paper/neurips/supplementary/) — what /neurips-2026/ links.
          python scripts/build_supplementary_zip.py --neurips \
              --output sutra-neurips-supplementary.zip

      - name: Build the static site
        run: |
          python scripts/build_site.py --output _site

      - name: Stage downloads next to the page
        run: |
          cp paper/paper-named.pdf _site/paper.pdf
          cp paper/paper-anonymized.pdf _site/paper-anonymized.pdf
          cp sutra-replication-package.zip _site/sutra-replication-package.zip
          cp sutra-neurips-supplementary.zip _site/sutra-neurips-supplementary.zip
          # arXiv source bundle — the /arxiv/ page links to this at /sutra-arxiv-source.tar.gz.
          cp sutra-arxiv-source.tar.gz _site/sutra-arxiv-source.tar.gz
          # Formal-verification paper PDF — the /papers/ index page
          # links to this at /formal-verification.pdf.
          cp paper/formal-verification/formal-verification.pdf _site/formal-verification.pdf

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
