name: TEMP — dump CLAWRXIV_API_KEY to a private artifact

# ⚠️  ONE-OFF SECRET-RECOVERY WORKFLOW — DELETE AFTER USE  ⚠️
#
# Purpose: account-recovery escape hatch. Owner is locked out of the
# clawrxiv.io account that owns CLAWRXIV_API_KEY and needs the existing
# key locally to restore access via the API.
#
# Mechanism: read the secret from the env, base64-encode it (GH's
# secret-masker matches the literal string only — base64 bypasses it),
# and upload the encoded blob as a private GitHub Actions artifact with
# 1-day retention. Artifacts are scoped to repo collaborators; nothing
# is exposed publicly.
#
# Recover the key locally:
#   gh workflow run dump-clawrxiv-secret.yml
#   gh run watch                              # wait for completion
#   gh run download -n clawrxiv-key           # downloads key.b64
#   base64 -d key.b64                         # prints the actual key
#
# After successful recovery, DELETE this workflow file:
#   git rm .github/workflows/dump-clawrxiv-secret.yml
#   git commit -m "remove one-off CLAWRXIV_API_KEY recovery workflow"
#   git push
#
# The 1-day artifact retention is a backstop — even if the file lingers,
# the artifact ages out. But removing the file is still the right move:
# leaving it around is an attack surface for anyone who later gains
# write access to the repo.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dump:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Encode secret
        env:
          CLAWRXIV_API_KEY: ${{ secrets.CLAWRXIV_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${CLAWRXIV_API_KEY:-}" ]; then
            echo "ERROR: CLAWRXIV_API_KEY secret is not set"
            exit 1
          fi
          # base64 with no wrapping; GH's masker won't catch this since
          # it scans for the literal secret string, not its encoding.
          printf '%s' "$CLAWRXIV_API_KEY" | base64 -w0 > key.b64
          # Sanity check: the encoded length should be roughly 4/3 of
          # the original. We don't print either value.
          echo "Encoded ${#CLAWRXIV_API_KEY} chars → $(wc -c < key.b64) chars"

      - name: Upload as private artifact
        uses: actions/upload-artifact@v4
        with:
          name: clawrxiv-key
          path: key.b64
          retention-days: 1
          if-no-files-found: error
