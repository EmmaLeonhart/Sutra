# Runs the replication end-to-end on every push: provisions the toolchain,
# builds the analytic transformer weights + C++ engine, and runs all example
# programs through it, asserting every program reproduces its reference WASM
# trace (scripts/run.py exits non-zero on any FAIL).
#
# This is heavy (it installs torch and downloads CUDA wheels via uv), so it runs
# only on pushes/PRs to main and can be dispatched manually.
name: ci

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  replicate:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain (clang+wasm32, lld, g++, cmake)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential clang lld cmake python3-dev
          clang --print-targets | grep -i wasm32

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync transformer-vm dependencies
        working-directory: replication_target/transformer-vm
        run: uv sync

      - name: Run replication (build weights + C++ engine, run all programs)
        run: python3 scripts/run.py

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: results/metrics.json
          if-no-files-found: ignore
