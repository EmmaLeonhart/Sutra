name: Competition analysis — scheduled refresh

# Pulls fresh paper metadata and review data from clawRxiv every
# 6 hours, regenerates `planning/competition-analysis-latest.md`
# from the updated JSON, and auto-commits the three changed files
# back to master.
#
# Schedule rationale: the cron fires at 04:00 / 10:00 / 16:00 /
# 22:00 UTC, which is 9 PM / 3 AM / 9 AM / 3 PM Pacific during
# PDT (UTC-7). This is a deliberate 3-hour OFFSET from the
# "on the hour" grid (00:00 / 06:00 / 12:00 / 18:00 UTC) so
# that fresh data is always available at least 3 hours BEFORE
# any round-number decision window. In working-day terms: the
# 3 PM Pacific refresh lands fresh data 3 hours before the
# 6 PM "end of afternoon" window, not 3 hours after.
#
# Manual trigger via workflow_dispatch is also supported for
# ad-hoc refreshes outside the cron cadence.

on:
  schedule:
    - cron: '0 4,10,16,22 * * *'
  workflow_dispatch:

concurrency:
  group: competition-cron-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh clawRxiv paper + review data and regenerate summary
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Fetch all papers (paginated /api/posts walk)
        run: |
          python scripts/fetch_all_papers.py

      - name: Fetch all per-paper reviews
        run: |
          python -u scripts/fetch_reviews.py

      - name: Regenerate planning/competition-analysis-latest.md
        run: |
          python scripts/write_competition_summary.py

      - name: Commit and push
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Only touch the three files this workflow is allowed to
          # produce. Defensive staging so a stray edit in the working
          # tree does not leak into the auto-commit.
          git add scripts/competition_analysis_raw.json || true
          git add scripts/competition_reviews.json       || true
          git add planning/competition-analysis-latest.md || true

          if git diff --cached --quiet; then
            echo "No changes to commit — paper and review data are unchanged since the last run."
            exit 0
          fi

          # The Skip-Submit: true trailer matches papers-ci.yml's
          # opt-out convention from commit d0767d5. papers-ci already
          # path-filters on sutra-paper/ and fly-brain-paper/ paths
          # only, so it would not fire on this commit anyway — but
          # future contributors adding a filter expansion would still
          # see the explicit opt-out here, which is cheap insurance.
          git commit -m "competition-cron: refresh paper and review data" \
                     -m "Skip-Submit: true"

          # Retry push with rebase in case papers-ci or pages.yml
          # landed a commit between our checkout and our push.
          for attempt in 1 2 3; do
            if git push; then
              exit 0
            fi
            echo "push attempt $attempt failed, rebasing and retrying..."
            git pull --rebase origin master
          done
          echo "ERROR: failed to push after 3 retries" >&2
          exit 1
