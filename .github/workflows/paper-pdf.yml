name: Paper PDF — anonymized + named builds

# Builds two PDFs from paper/paper.tex via the \ifanon switch.
# Triggered on push to paper/ on master, plus workflow_dispatch.
# Both PDFs uploaded as workflow artifacts; future extension will
# also deploy them to the docs site (sutralang.dev).
#
# Per Emma 2026-04-30 (queue sub-items 1d + 1e): single source,
# four outputs (HTML + named PDF + anonymized PDF + clawRxiv
# upload). The clawRxiv path is in papers-ci.yml; this workflow
# handles the PDF outputs. HTML is a future extension via
# pandoc + the docs site deploy.

on:
  push:
    branches: [master]
    paths:
      - 'paper/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-pdfs:
    name: Build named + anonymized PDFs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live + pandoc
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-recommended \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-luatex \
            texlive-xetex \
            lmodern \
            latexmk \
            pandoc

      - name: Generate paper.tex.body from paper.md
        working-directory: paper
        run: |
          # --from=markdown-smart (not gfm): pandoc's gfm reader does
          # not support the raw_tex extension, so every \begin{align*}
          # / \begin{figure} / \begin{tikzpicture} block in paper.md
          # was being escaped to literal \textbackslash text and then
          # typeset as monospace gibberish — every display-math block
          # and all three TikZ figures rendered as their LaTeX source
          # rather than as math/figures. The markdown reader
          # passes raw LaTeX through untouched. `-smart` keeps
          # straight quotes (paper source already uses em-dashes
          # directly).
          pandoc paper.md \
            --from=markdown-smart \
            --to=latex \
            --output=paper.tex.body \
            --wrap=preserve \
            --no-highlight

      - name: Build named PDF
        working-directory: paper
        run: |
          # latexmk + lualatex cooperate poorly with our combo of
          # microtype + newunicodechar substitutions: lualatex
          # accumulates non-fatal "! Missing number" errors when
          # microtype tries to compute protrusion for substituted
          # Unicode chars, then exits with code 1 even though the PDF
          # is produced correctly. -f tells latexmk to keep going,
          # but it still propagates lualatex's exit code at the end.
          # Run it with `|| true` and assert PDF existence + size as
          # the success criterion instead.
          latexmk -lualatex -interaction=nonstopmode -f \
            -e '$max_repeat=8' paper.tex || true
          # PDF must exist and be non-trivial (>= 50 KB rules out an
          # early-exit half-built file).
          test -s paper.pdf
          size=$(stat -c%s paper.pdf)
          if [ "$size" -lt 50000 ]; then
            echo "ERROR: paper.pdf is only $size bytes; build is broken."
            exit 1
          fi
          echo "paper.pdf: $size bytes"
          mv paper.pdf paper-named.pdf

      - name: Clean intermediate
        working-directory: paper
        run: |
          latexmk -c paper.tex || true

      - name: Build anonymized PDF
        working-directory: paper
        run: |
          # Inject \anontrue at the start of the document via a
          # wrapper file so the source remains unchanged. The
          # wrapper sets the flag, then \input{paper.tex} which
          # detects it via \ifanon.
          cat > paper-anon.tex <<'EOF'
          \PassOptionsToPackage{anonymous}{}
          \input{paper.tex}
          EOF
          # Pass the flag via -usepretex. The pretex must declare
          # \ifanon itself because paper.tex guards its \newif via
          # \@ifundefined to avoid resetting the flag.
          latexmk -lualatex -interaction=nonstopmode -f \
            -e '$max_repeat=8' \
            -usepretex='\newif\ifanon\anontrue' paper.tex || true
          test -s paper.pdf
          size=$(stat -c%s paper.pdf)
          if [ "$size" -lt 50000 ]; then
            echo "ERROR: anonymized paper.pdf is only $size bytes."
            exit 1
          fi
          echo "anonymized paper.pdf: $size bytes"
          mv paper.pdf paper-anonymized.pdf

      - name: Upload PDFs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdfs
          path: |
            paper/paper-named.pdf
            paper/paper-anonymized.pdf
          retention-days: 90
