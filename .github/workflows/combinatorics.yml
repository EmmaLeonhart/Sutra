name: Paper-fix combinatorics review (serial supersedes chain)

# Manual workflow that walks every 2^N paper-fix combination through
# clawrxiv's supersedes chain. Each variant is submitted as a
# revision of the previous, gets reviewed, and we save the review
# JSON. After N variants the chain has advanced N times; we restore
# paper/.post_id to its pre-combinatorics value at the end so the
# canonical chain isn't permanently bombed by throwaway variants.
#
# Why serial-supersedes (not parallel candidates):
#   clawrxiv's duplicate detection (title + abstract match) is
#   strict and not bypassed by dedup_token for exact matches.
#   Parallel candidate submissions all 409 as duplicates. Modifying
#   title or abstract per-variant contaminates the review signal
#   AND the dedup detector sees through trivial markers anyway.
#   The supersedes chain is the legitimate API surface for
#   submitting multiple versions of the same paper, so we use it,
#   accepting the wall-clock cost of serial execution.
#
# Trigger: workflow_dispatch only.

on:
  workflow_dispatch:
    inputs:
      vary_bits:
        description: |
          Comma-separated bit indices to vary, OR a single integer
          mask of bits to vary. With vary_bits='3,4,5', 2^3=8
          variants are tested. Default '3,4,5'.
        required: false
        default: '3,4,5'
      fixed_bits:
        description: |
          Bitmask of fixes to ALWAYS apply (bits not in vary_bits).
          Default 0.
        required: false
        default: '0'
      baseline_ref:
        description: |
          Git ref to check out for paper.md and the fix scripts.
          Default master.
        required: false
        default: 'master'
      restore_post_id:
        description: |
          Whether to restore paper/.post_id to its pre-run value
          after combinatorics finishes. Default true so the
          canonical chain isn't permanently advanced. Set false to
          keep the last variant as the new canonical (rare).
        required: false
        default: 'true'

concurrency:
  group: combinatorics
  cancel-in-progress: false

permissions:
  contents: write  # to commit reviews back

jobs:
  combinatorics:
    name: Walk variants through supersedes chain
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.baseline_ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Compute variant masks
        id: plan
        run: |
          python3 - <<'PYEOF'
          import json, os
          vary = "${{ inputs.vary_bits }}".strip()
          fixed = int("${{ inputs.fixed_bits }}".strip() or "0")
          if "," in vary:
              vary_bits = [int(x) for x in vary.split(",") if x.strip()]
          elif vary.isdigit():
              v = int(vary)
              vary_bits = [i for i in range(64) if (v >> i) & 1]
          else:
              vary_bits = [3, 4, 5]
          n = len(vary_bits)
          masks = []
          for k in range(1 << n):
              m = fixed
              for i, bit in enumerate(vary_bits):
                  if (k >> i) & 1:
                      m |= 1 << bit
                  else:
                      m &= ~(1 << bit)
              masks.append(m)
          masks = sorted(set(masks))
          print(f"vary_bits={vary_bits}  fixed_bits={fixed}  n_variants={len(masks)}")
          print(f"masks={masks}")
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"masks={json.dumps(masks)}\n")
              f.write(f"n_variants={len(masks)}\n")
          PYEOF

      - name: Walk supersedes chain across variants
        env:
          CLAWRXIV_API_KEY: ${{ secrets.CLAWRXIV_API_KEY }}
          MASKS_JSON: ${{ steps.plan.outputs.masks }}
        run: |
          set -euo pipefail
          # Snapshot the starting post_id so we can restore at the
          # end if requested.
          ORIGINAL_POST_ID=$(cat paper/.post_id || echo "")
          echo "Original canonical post_id: $ORIGINAL_POST_ID"
          echo "$ORIGINAL_POST_ID" > /tmp/original_post_id

          # The Python orchestrator handles the loop: for each mask,
          # apply fixes to a fresh copy of paper/paper.md, write it
          # back to disk so paper_submit_and_fetch.py reads the
          # variant, then call that script which uses the supersedes
          # chain (reads .post_id, submits, writes new .post_id,
          # saves review files).
          python3 - <<'PYEOF'
          import json, os, subprocess, sys, time
          from pathlib import Path
          sys.path.insert(0, "scripts")
          from paper_fixes import apply_fixes, mask_label

          masks = json.loads(os.environ["MASKS_JSON"])
          paper_md = Path("paper/paper.md")
          baseline_text = paper_md.read_text(encoding="utf-8")
          results = []

          for i, mask in enumerate(masks):
              modified, applied = apply_fixes(baseline_text, mask)
              paper_md.write_text(modified, encoding="utf-8")
              label = mask_label(mask)
              print(f"\n[{i + 1}/{len(masks)}] mask={mask} ({label})")
              print(f"  applies: {applied or '(no-op)'}")

              # Snapshot current .post_id so we know what this
              # variant superseded (for the results table).
              current_post_id = Path("paper/.post_id").read_text(encoding="utf-8").strip()

              t = time.monotonic()
              proc = subprocess.run(
                  [sys.executable, "-u", "scripts/paper_submit_and_fetch.py",
                   "--paper-dir", "paper",
                   "--tags", "programming-languages,vsa,embedding-spaces",
                   "--poll-seconds", "5",
                   "--review-timeout-seconds", "90"],
                  capture_output=True, text=True,
              )
              elapsed = time.monotonic() - t

              # Read the new .post_id (script writes it on success).
              new_post_id = Path("paper/.post_id").read_text(encoding="utf-8").strip()
              entry = {
                  "mask": mask,
                  "label": label,
                  "applied": applied,
                  "superseded": current_post_id,
                  "new_post_id": new_post_id,
                  "elapsed_seconds": round(elapsed, 1),
                  "exit_code": proc.returncode,
                  "stdout_tail": proc.stdout.splitlines()[-10:] if proc.stdout else [],
                  "stderr_tail": proc.stderr.splitlines()[-3:] if proc.stderr else [],
              }
              # The canonical script saves reviews to paper/reviews/v*_post*_review.json.
              # Find the matching one for this post.
              if new_post_id and new_post_id != current_post_id:
                  matches = list(Path("paper/reviews").glob(f"v*_post{new_post_id}_review.json"))
                  if matches:
                      try:
                          entry["review"] = json.loads(matches[0].read_text(encoding="utf-8"))
                      except Exception as e:
                          entry["review_parse_error"] = str(e)
                  else:
                      entry["review"] = None
              else:
                  entry["review"] = None

              rating = (entry.get("review") or {}).get("rating", "?")
              print(f"  -> {rating}  (post {new_post_id}, {elapsed:.1f}s, exit {proc.returncode})")
              results.append(entry)

          Path("combinatorics_results.json").write_text(
              json.dumps(results, indent=2, ensure_ascii=False),
              encoding="utf-8",
          )

          # Markdown summary table.
          lines = [
              "# Combinatorics review results (serial supersedes chain)",
              "",
              "| mask | label | rating | post | superseded | applied |",
              "|---:|---|---|---:|---:|---|",
          ]
          for r in results:
              rating = (r.get("review") or {}).get("rating", "(no review)")
              applied = ", ".join(r["applied"]) or "(baseline)"
              lines.append(
                  f"| {r['mask']} | `{r['label']}` | {rating} | "
                  f"{r['new_post_id']} | {r['superseded']} | {applied} |"
              )
          Path("combinatorics_summary.md").write_text("\n".join(lines), encoding="utf-8")
          print("\n" + "\n".join(lines))
          PYEOF

      - name: Restore .post_id to pre-combinatorics value
        if: inputs.restore_post_id == 'true'
        run: |
          set -euo pipefail
          if [ -s /tmp/original_post_id ]; then
            cp /tmp/original_post_id paper/.post_id
            echo "Restored paper/.post_id to $(cat paper/.post_id)"
          fi

      - name: Restore paper.md from baseline
        run: |
          # The serial loop wrote variant text to paper/paper.md. We
          # don't want the last variant's text persisted; restore
          # from git.
          git checkout -- paper/paper.md

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: combinatorics-results
          path: |
            combinatorics_results.json
            combinatorics_summary.md
          retention-days: 90

      - name: Commit results + reviews back (with rebase-retry)
        if: always()
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Stage review files (paper_submit_and_fetch.py wrote them
          # during the loop), .post_id (restored if requested), and
          # the results files.
          git add paper/reviews/ 2>/dev/null || true
          if [ -f paper/.post_id ]; then git add paper/.post_id; fi
          git add combinatorics_results.json combinatorics_summary.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "Nothing to commit"
            exit 0
          fi
          git diff --cached --stat
          git commit -m "combinatorics: serial supersedes chain results

          $(date -u +%Y-%m-%dT%H:%M:%SZ) auto-commit by combinatorics.yml.
          Walked the variant chain, captured per-variant reviews under
          paper/reviews/, and saved combinatorics_results.json +
          combinatorics_summary.md.

          Skip-Submit: true"
          for attempt in 1 2 3; do
            if git push origin HEAD:master; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt rejected; rebasing and retrying..."
            git fetch origin master
            git rebase origin/master
          done
          echo "ERROR: could not push after 3 rebase-retry attempts"
          exit 1
