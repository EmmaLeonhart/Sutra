# MkDocs Material configuration for the Sutra language website.
# Built and deployed by .github/workflows/pages.yml on every push to main
# that touches docs/, mkdocs.yml, README.md, or planning/sutra-spec/.
#
# Live at: https://sutra.emmaleonhart.com
# (Custom domain pinned via docs/CNAME, which MkDocs copies into the
# build output where GitHub Pages picks it up. DNS is configured by
# the domain owner outside this repo.)

site_name: Sutra 📜
site_description: "\U0001F4DC Sutra is a geometrically compiled language where logical operations over vector spaces are resolved at compile time into matrix multiplications."
site_url: https://sutra.emmaleonhart.com
site_author: Emma Leonhart

repo_url: https://github.com/EmmaLeonhart/Sutra
repo_name: EmmaLeonhart/Sutra
edit_uri: edit/main/docs/

# Sites under user.github.io/Repo are served from /Repo/, not the root.
# This must match the repo name on GitHub Pages or every link breaks.
docs_dir: docs
site_dir: _site

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.integrate
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  # Dark is the default (slate listed first, no prefers-color-scheme
  # media) to match the shared identity at emmaleonhart.com/_identity/.
  # The toggle is kept (Material persists the choice in localStorage);
  # the Lacquer palette is applied via extra_css → stylesheets/identity.css.
  palette:
    - scheme: slate
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  font:
    text: Inter
    code: JetBrains Mono
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      # Allow snippets to include files from outside docs/, specifically
      # paper/paper.md which is rendered as the body of the
      # "Theory and Paper" page.
      base_path:
        - .
        - docs
      check_paths: true
  - pymdownx.superfences:
      # Mermaid fenced blocks for diagrams. Declaring this custom
      # fence is what enables Material for MkDocs' built-in mermaid
      # rendering — used on the primitive-classes page.
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - Home: index.md
  - What is Sutra?: what-is-sutra.md
  - Theory and Paper:
    # Section landing page — the HTML version of the paper itself,
    # with a link to the PDF (built by paper-pdf.yml and served at
    # /paper.pdf).
    - Theory and Paper: theory-and-paper.md
    # Frozen NeurIPS 2026 submission archive — downloads for the
    # camera-ready PDF, anonymized PDF, and supplementary zip.
    - NeurIPS 2026 (frozen): neurips-2026.md
    - Paradigms: paradigms.md
    - Ontology: ontology.md
    - Primitive classes: primitive-classes.md
    - Operators: operators.md
    - Logical operations: logical-operations.md
    - Numeric math: numeric-math.md
    - Memory: memory.md
    - Loops: loops.md
    - Promises and async/await: promises.md
    - TypeScript → Sutra mapping: typescript-to-sutra.md
    - Compilation: compilation.md
    - The graph-to-vector leap: vision.md
    - Fuzzy logic explorer: interactive/fuzzy-logic.md
    - Tutorials:
      - tutorials/index.md
      - 01 — Hello Sutra: tutorials/01-hello-sutra.md
      - 02 — Bind and unbind: tutorials/02-bind-and-unbind.md
      - 03 — Snap-to-nearest: tutorials/03-snap-to-nearest.md
    - Demos: demos.md
    - History: history.md
    # SutraDB is the database side of the Sutra ecosystem — the static
    # HTML site lives under sutraDB/pages/ and is mounted at /SutraDB/
    # on this Pages deploy by the pages.yml workflow.
    - SutraDB: /SutraDB/

extra_css:
  - stylesheets/identity.css

extra_javascript:
  - assets/js/bind-unbind.js
  - assets/js/snap-to-nearest.js
  - assets/js/fuzzy-logic.js

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/EmmaLeonhart/Sutra
  generator: false

copyright: >
  &copy; 2026 Emma Leonhart &middot; Open source &middot;
  <a href="https://github.com/EmmaLeonhart/Sutra">github.com/EmmaLeonhart/Sutra</a>
